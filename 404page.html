<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>
<link rel="stylesheet" href="style.css">
<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at top right,rgba(200,151,58,.25),transparent 35%),
    linear-gradient(135deg,#07111f,#102039,#07111f);
  color:#fff;
  font-family:Arial,sans-serif;
  text-align:center;
  padding:24px;
}
.error-box{
  max-width:620px;
  width:100%;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(200,151,58,.35);
  border-radius:28px;
  padding:55px 30px;
  box-shadow:0 25px 70px rgba(0,0,0,.35);
  backdrop-filter:blur(8px);
}
.error-box img{
  width:140px;
  max-width:60%;
  margin-bottom:20px;
}
.error-box h1{
  font-size:clamp(72px,18vw,150px);
  line-height:.9;
  margin:0;
  color:#c8973a;
  text-shadow:0 0 28px rgba(200,151,58,.35);
}
.error-box h2{
  font-size:clamp(26px,5vw,42px);
  margin:18px 0 12px;
}
.error-box p{
  color:rgba(255,255,255,.75);
  font-size:18px;
  line-height:1.7;
  margin:0 auto 28px;
  max-width:500px;
}
.error-actions{
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
}
.error-actions a{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:150px;
  padding:13px 24px;
  border-radius:999px;
  text-decoration:none;
  font-weight:800;
  transition:.3s ease;
}
.error-actions .home{
  background:#c8973a;
  color:#07111f;
}
.error-actions .contact{
  border:1px solid rgba(255,255,255,.35);
  color:#fff;
}
.error-actions a:hover{
  transform:translateY(-4px);
}
@media(max-width:560px){
  .error-box{padding:42px 20px;border-radius:22px;}
  .error-actions a{width:100%;}
}
</style>
</head>
<body>
  <main class="error-box">
    <img src="assets/logo-dark.webp" alt="Stackly Logo">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>This social media page is not available right now. Please return to the home page or contact the Stackly Estate team.</p>
    <div class="error-actions">
      <a class="home" href="index.html">Back To Home</a>
      <a class="contact" href="contact.html">Contact Us</a>
    </div>
  </main>
</body>
</html>
